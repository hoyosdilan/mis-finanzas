<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Mis Finanzas</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#C9582A" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Finanzas" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500;1,6..72,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <!-- Solo los ejes que usa la app (Icon en shared/ds/Primitives.jsx): opsz 24, wght 400-500, FILL 0/1.
       display=block evita que se vea el texto de la ligadura mientras carga la fuente. -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL@24,400..500,0..1&display=block" rel="stylesheet" />

  <!-- Splash instantáneo: pinta antes de que baje el JS. React lo reemplaza al montar. -->
  <style>
    #root:empty {
      position: fixed;
      inset: 0;
      background: #FBF7EE;
    }

    #root:empty::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 36px;
      height: 36px;
      margin: -18px 0 0 -18px;
      border-radius: 50%;
      border: 3px solid rgba(201, 88, 42, 0.2);
      border-top-color: #C9582A;
      animation: splash-spin 0.8s linear infinite;
    }

    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
